name: Keep Render Service Awake

on:
  schedule:
    # Runs every 12 minutes
    - cron: "*/12 * * * *"

  # Allows manual run from GitHub Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Render service
        run: |
          curl -L --fail --max-time 30 https://splito-3ghi.onrender.com || exit 1